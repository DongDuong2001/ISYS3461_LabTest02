server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: tour-service
          uri: http://localhost:8081
          predicates:
            - Path=/tours/**
        - id: company-service
          uri: http://localhost:8082
          predicates:
            - Path=/companies/**
